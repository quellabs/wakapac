<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WakaStore — test suite</title>
    <style>
        body { font-family: monospace; padding: 2rem; background: #1e1e1e; color: #d4d4d4; }
        h1   { color: #9cdcfe; margin-bottom: 0.25rem; font-size: 1.1rem; }
        p.subtitle { color: #6a9955; margin-top: 0; margin-bottom: 2rem; font-size: 0.85rem; }

        #results { display: flex; flex-direction: column; gap: 0.35rem; }

        .suite  { color: #569cd6; margin-top: 1rem; margin-bottom: 0.2rem; font-weight: bold; }
        .pass   { color: #4ec9b0; }
        .pass::before { content: '✓ '; }
        .fail   { color: #f44747; }
        .fail::before { content: '✗ '; }
        .info   { color: #808080; padding-left: 1.5rem; font-size: 0.85rem; }

        #summary {
            margin-top: 2rem;
            padding: 0.75rem 1rem;
            border-radius: 4px;
            font-weight: bold;
        }
        #summary.all-pass { background: #1e3a2f; color: #4ec9b0; }
        #summary.has-fail { background: #3a1e1e; color: #f44747; }
    </style>
</head>
<body>

<h1>WakaStore — test suite</h1>
<p class="subtitle">Open DevTools console for detailed failure output</p>
<div id="results"></div>
<div id="summary"></div>

<!--
    Replace these paths with your actual script locations.
    wakastore.js must be loaded AFTER wakapac.js.
-->
<script src="../wakapac.js"></script>
<script src="../plugins/wakastore.js"></script>

<script>
    (function () {
        'use strict';

        // ─── Mini test runner ────────────────────────────────────────────────────

        const results  = document.getElementById('results');
        const summary  = document.getElementById('summary');
        let passed = 0;
        let failed = 0;
        let currentSuite = null;

        function suite(name) {
            currentSuite = name;
            const el = document.createElement('div');
            el.className = 'suite';
            el.textContent = name;
            results.appendChild(el);
        }

        function pass(name) {
            passed++;
            const el = document.createElement('div');
            el.className = 'pass';
            el.textContent = name;
            results.appendChild(el);
        }

        function fail(name, reason) {
            failed++;
            console.error('[FAIL]', currentSuite, '>', name, '\n', reason);
            const el = document.createElement('div');
            el.className = 'fail';
            el.textContent = name;
            results.appendChild(el);
            const info = document.createElement('div');
            info.className = 'info';
            info.textContent = String(reason);
            results.appendChild(info);
        }

        function assert(condition, message) {
            if (!condition) throw new Error('Assertion failed: ' + message);
        }

        function assertEqual(actual, expected, label) {
            if (JSON.stringify(actual) !== JSON.stringify(expected)) {
                throw new Error(
                    (label || 'assertEqual') +
                    '\n  expected: ' + JSON.stringify(expected) +
                    '\n  actual:   ' + JSON.stringify(actual)
                );
            }
        }

        /**
         * Runs an async test, catching any thrown assertion errors.
         * Returns a Promise so tests in a suite can be awaited in sequence.
         */
        async function test(name, fn) {
            try {
                await fn();
                pass(name);
            } catch (e) {
                fail(name, e.message || e);
            }
        }

        // ─── Fake fetch helpers ──────────────────────────────────────────────────

        /**
         * Installs a global fetch stub that resolves with the given response body.
         * Returns a spy object with a `calls` counter.
         * Automatically restores the original fetch when restore() is called.
         */
        function stubFetch(responseBody, opts) {
            opts = opts || {};
            const spy = { calls: 0, restore: null };
            const original = window.fetch;

            window.fetch = function () {
                spy.calls++;
                if (opts.fail) {
                    return Promise.resolve({ ok: false, status: opts.status || 500 });
                }
                return Promise.resolve({
                    ok: true,
                    json: function () { return Promise.resolve(responseBody); }
                });
            };

            spy.restore = function () { window.fetch = original; };
            return spy;
        }

        /**
         * Waits `ms` milliseconds. Used to let poll cycles complete in real time.
         * Tests use short intervals (50–150ms) to stay fast.
         */
        function wait(ms) {
            return new Promise(function (resolve) { setTimeout(resolve, ms); });
        }

        // ─── Plain JSON fixtures ──────────────────────────────────────────────────

        const USER_RESPONSE = { name: 'Floris', role: 'admin' };

        const USERS_RESPONSE = {
            users: [
                { id: '1', name: 'Floris', role: 'admin' },
                { id: '2', name: 'Jan',    role: 'editor' }
            ]
        };

        const UPDATED_USER_RESPONSE = { name: 'Floris', role: 'superadmin' };

        // ─── Test suites ──────────────────────────────────────────────────────────

        async function runAll() {

            // ── 1. Poll default merge (plain JSON) ────────────────────────────────
            suite('Poll default merge');

            await test('plain object response is shallow-merged onto the store', async function () {
                const store = wakaStore.createStore({ name: null, role: null });
                const spy = stubFetch(USER_RESPONSE);

                store.poll('/api/user', { interval: 50 });
                await wait(100);
                store.stopPoll();
                spy.restore();

                assertEqual(store.name, 'Floris', 'name');
                assertEqual(store.role, 'admin',  'role');
            });

            await test('only top-level keys from response are written to store', async function () {
                const store = wakaStore.createStore({ name: null, role: null, extra: 'keep' });
                const spy = stubFetch({ name: 'Jan' });

                store.poll('/api/user', { interval: 50 });
                await wait(100);
                store.stopPoll();
                spy.restore();

                assertEqual(store.name,  'Jan',   'name updated');
                assertEqual(store.extra, 'keep',  'extra key untouched');
            });

            await test('response overwrites existing store values', async function () {
                const store = wakaStore.createStore({ name: 'Old', role: 'guest' });
                const spy = stubFetch(USER_RESPONSE);

                store.poll('/api/user', { interval: 50 });
                await wait(100);
                store.stopPoll();
                spy.restore();

                assertEqual(store.name, 'Floris', 'name overwritten');
                assertEqual(store.role, 'admin',  'role overwritten');
            });

            await test('non-plain-object response logs a warning and does not crash', async function () {
                const store = wakaStore.createStore({ items: [] });
                const spy = stubFetch([1, 2, 3]); // array — not a plain object
                const warnings = [];
                const origWarn = console.warn;
                console.warn = function () { warnings.push([].slice.call(arguments).join(' ')); };

                store.poll('/api/items', { interval: 50 });
                await wait(100);
                store.stopPoll();
                spy.restore();
                console.warn = origWarn;

                assert(warnings.length > 0, 'console.warn called for non-object response');
            });

            // ── 2. Poll lifecycle ─────────────────────────────────────────────────
            suite('Poll lifecycle');

            await test('fetch is called after the interval elapses', async function () {
                const store = wakaStore.createStore({ name: null });
                const spy = stubFetch(USER_RESPONSE);

                store.poll('/api/user', { interval: 80 });

                // Not called yet — interval hasn't elapsed
                await wait(40);
                const callsBefore = spy.calls;

                await wait(60); // now past 80ms
                store.stopPoll();
                spy.restore();

                assert(callsBefore === 0, 'fetch not called before interval (' + callsBefore + ' calls)');
                assert(spy.calls >= 1, 'fetch called after interval (' + spy.calls + ' calls)');
            });

            await test('fetch is called on each subsequent interval', async function () {
                const store = wakaStore.createStore({ name: null });
                const spy = stubFetch(USER_RESPONSE);

                store.poll('/api/user', { interval: 50 });
                await wait(180); // ~3 cycles at 50ms
                store.stopPoll();
                spy.restore();

                assert(spy.calls >= 2, 'at least 2 poll cycles (' + spy.calls + ' calls)');
            });

            await test('stopPoll() prevents further fetches', async function () {
                const store = wakaStore.createStore({ name: null });
                const spy = stubFetch(USER_RESPONSE);

                store.poll('/api/user', { interval: 50 });
                await wait(80);
                store.stopPoll();
                const callsAtStop = spy.calls;

                await wait(150); // would trigger more cycles if still polling
                spy.restore();

                assertEqual(spy.calls, callsAtStop, 'no further calls after stopPoll');
            });

            await test('calling poll() again replaces the active poll', async function () {
                const store = wakaStore.createStore({ name: null, product: null });
                const spy1 = stubFetch(USER_RESPONSE);

                store.poll('/api/user', { interval: 50 });
                await wait(80);
                spy1.restore();

                // Replace with a new poll targeting a different endpoint
                const spy2 = stubFetch({ product: 'Widget' });

                store.poll('/api/product', { interval: 50 });
                await wait(100);
                store.stopPoll();
                spy2.restore();

                assertEqual(store.product, 'Widget', 'product populated by new poll');
            });

            await test('stopPoll() is safe to call when no poll is active', async function () {
                const store = wakaStore.createStore({ name: null });
                // Should not throw
                store.stopPoll();
                pass('no error thrown');
            });

            // ── 3. Store updates ──────────────────────────────────────────────────
            suite('Store updates');

            await test('store is updated with latest server data on each cycle', async function () {
                const store = wakaStore.createStore({ name: null });
                let cycle = 0;

                window.fetch = function () {
                    cycle++;
                    return Promise.resolve({
                        ok: true,
                        json: function () {
                            return Promise.resolve({ name: 'User ' + cycle });
                        }
                    });
                };

                store.poll('/api/user', { interval: 50 });
                await wait(80);
                const nameAfterFirst = store.name;

                await wait(60);
                const nameAfterSecond = store.name;

                store.stopPoll();
                window.fetch = undefined;

                assert(nameAfterFirst === 'User 1', 'first cycle: ' + nameAfterFirst);
                assert(nameAfterSecond === 'User 2', 'second cycle: ' + nameAfterSecond);
            });

            await test('local mutations are overwritten by the next poll cycle', async function () {
                const store = wakaStore.createStore({ name: null, role: null });
                const spy = stubFetch(USER_RESPONSE);

                store.poll('/api/user', { interval: 100 });
                await wait(120); // first cycle populates store

                // Local mutation
                store.name = 'LocalOverride';
                assertEqual(store.name, 'LocalOverride', 'local mutation applied');

                await wait(110); // second cycle should overwrite
                store.stopPoll();
                spy.restore();

                // Server data wins
                assert(store.name !== 'LocalOverride', 'server data overwrites local mutation');
            });

            // ── 4. Custom merge callback ──────────────────────────────────────────
            suite('Custom merge callback');

            await test('merge callback is called with response and store as this', async function () {
                const store = wakaStore.createStore({ items: [], total: 0 });
                let capturedThis = null;
                let capturedResponse = null;

                const spy = stubFetch({ data: { items: ['a', 'b'], total: 2 } });

                store.poll('/api/data', {
                    interval: 50,
                    merge: function (response) {
                        capturedThis     = this;
                        capturedResponse = response;
                        this.items = response.data.items;
                        this.total = response.data.total;
                    }
                });

                await wait(100);
                store.stopPoll();
                spy.restore();

                assert(capturedThis === store, 'this === store proxy');
                assert(capturedResponse !== null, 'response received');
                assertEqual(store.items, ['a', 'b'], 'items');
                assertEqual(store.total, 2, 'total');
            });

            await test('merge callback bypasses default Object.assign merge', async function () {
                const store = wakaStore.createStore({ result: null });

                // Envelope shape — would not be handled by default merge correctly
                const spy = stubFetch({ weirdShape: { value: 42 } });

                store.poll('/api/weird', {
                    interval: 50,
                    merge: function (response) {
                        this.result = response.weirdShape.value;
                    }
                });

                await wait(100);
                store.stopPoll();
                spy.restore();

                assertEqual(store.result, 42, 'result from custom merge');
            });

            // ── 5. Error handling ─────────────────────────────────────────────────
            suite('Error handling');

            await test('onError callback is called on HTTP error response', async function () {
                const store = wakaStore.createStore({ user: [] });
                let errorReceived = null;

                const spy = stubFetch(null, { fail: true, status: 404 });

                store.poll('/api/users', {
                    interval: 50,
                    onError: function (err) { errorReceived = err; }
                });

                await wait(100);
                store.stopPoll();
                spy.restore();

                assert(errorReceived !== null, 'onError was called');
                assert(errorReceived.status === 404, 'error carries HTTP status');
            });

            await test('poll loop continues after an error', async function () {
                const store = wakaStore.createStore({ user: [] });
                let errorCount = 0;

                const spy = stubFetch(null, { fail: true, status: 500 });

                store.poll('/api/users', {
                    interval: 50,
                    onError: function () { errorCount++; }
                });

                await wait(180); // ~3 cycles
                store.stopPoll();
                spy.restore();

                assert(errorCount >= 2, 'loop continued after errors (' + errorCount + ' errors)');
            });

            await test('stopPoll() inside onError stops the loop', async function () {
                const store = wakaStore.createStore({ user: [] });
                let errorCount = 0;

                const spy = stubFetch(null, { fail: true, status: 401 });

                store.poll('/api/users', {
                    interval: 50,
                    onError: function () {
                        errorCount++;
                        store.stopPoll();
                    }
                });

                await wait(200);
                spy.restore();

                assertEqual(errorCount, 1, 'loop stopped after first error');
            });

            await test('fetch rejection (network error) triggers onError', async function () {
                const store = wakaStore.createStore({ user: [] });
                let errorReceived = null;
                const original = window.fetch;

                window.fetch = function () {
                    return Promise.reject(new TypeError('Network failure'));
                };

                store.poll('/api/users', {
                    interval: 50,
                    onError: function (err) { errorReceived = err; }
                });

                await wait(100);
                store.stopPoll();
                window.fetch = original;

                assert(errorReceived instanceof TypeError, 'network error passed to onError');
            });

            // ── 6. Page Visibility API ────────────────────────────────────────────
            suite('Page Visibility API');

            await test('fetch is skipped while tab is hidden', async function () {
                const store = wakaStore.createStore({ name: null });
                const spy = stubFetch(USER_RESPONSE);

                // Hide the tab before polling starts
                Object.defineProperty(document, 'visibilityState', {
                    configurable: true,
                    get: () => 'hidden'
                });

                store.poll('/api/user', { interval: 50 });
                await wait(200);
                store.stopPoll();
                spy.restore();

                // Restore visibility for subsequent tests
                Object.defineProperty(document, 'visibilityState', {
                    configurable: true,
                    get: () => 'visible'
                });

                assertEqual(spy.calls, 0, 'fetch not called while hidden (' + spy.calls + ' calls)');
            });

            await test('fetch resumes after tab becomes visible again', async function () {
                const store = wakaStore.createStore({ name: null });
                const spy = stubFetch(USER_RESPONSE);

                // Start hidden
                Object.defineProperty(document, 'visibilityState', {
                    configurable: true,
                    get: () => 'hidden'
                });

                store.poll('/api/user', { interval: 50 });
                await wait(150);
                const callsWhileHidden = spy.calls;

                // Become visible
                Object.defineProperty(document, 'visibilityState', {
                    configurable: true,
                    get: () => 'visible'
                });

                await wait(150);
                store.stopPoll();
                spy.restore();

                assertEqual(callsWhileHidden, 0, 'no calls while hidden');
                assert(spy.calls >= 1, 'calls resumed after visible (' + spy.calls + ' calls)');
            });

            // ── 7. createStore validation ─────────────────────────────────────────
            suite('createStore validation');

            await test('throws on null', async function () {
                let threw = false;
                try { wakaStore.createStore(null); } catch (e) { threw = true; }
                assert(threw, 'should throw on null');
            });

            await test('throws on array', async function () {
                let threw = false;
                try { wakaStore.createStore([]); } catch (e) { threw = true; }
                assert(threw, 'should throw on array');
            });

            await test('throws on Date', async function () {
                let threw = false;
                try { wakaStore.createStore(new Date()); } catch (e) { threw = true; }
                assert(threw, 'should throw on Date');
            });

            await test('throws on Map', async function () {
                let threw = false;
                try { wakaStore.createStore(new Map()); } catch (e) { threw = true; }
                assert(threw, 'should throw on Map');
            });

            await test('accepts plain object', async function () {
                const store = wakaStore.createStore({ x: 1 });
                assert(store !== null, 'store created');
            });

            // ── 8. Local persistence — save / load / clearPersist ─────────────────
            suite('Local persistence — save / load / clearPersist');

            /**
             * Installs an in-memory localStorage stub and returns a restore function.
             * The real localStorage is not touched during tests.
             */
            function stubLocalStorage() {
                const storage = {};
                const original = window.localStorage;

                const stub = {
                    getItem:    function (k)    { return Object.prototype.hasOwnProperty.call(storage, k) ? storage[k] : null; },
                    setItem:    function (k, v) { storage[k] = String(v); },
                    removeItem: function (k)    { delete storage[k]; },
                    _raw: storage
                };

                Object.defineProperty(window, 'localStorage', { configurable: true, get: () => stub });

                return {
                    raw: storage,
                    restore: function () {
                        Object.defineProperty(window, 'localStorage', { configurable: true, get: () => original });
                    }
                };
            }

            await test('save() writes current state to localStorage', async function () {
                const ls = stubLocalStorage();
                const store = wakaStore.createStore({ name: 'Floris' }, { persist: 'test-save' });
                store.name = 'Jan';
                store.save();
                const stored = JSON.parse(ls.raw['test-save']);
                ls.restore();
                assertEqual(stored.name, 'Jan', 'persisted name');
            });

            await test('save() returns true on success', async function () {
                const ls = stubLocalStorage();
                const store = wakaStore.createStore({ x: 1 }, { persist: 'test-save-ret' });
                const result = store.save();
                ls.restore();
                assert(result === true, 'save() returned true');
            });

            await test('save() returns false when no persist key set', async function () {
                const store = wakaStore.createStore({ x: 1 });
                const result = store.save();
                assert(result === false, 'save() returned false');
            });

            await test('load() rehydrates stored values into the store', async function () {
                const ls = stubLocalStorage();
                ls.raw['test-load'] = JSON.stringify({ theme: 'dark' });
                const store = wakaStore.createStore({ theme: 'light' }, { persist: 'test-load', autoLoad: true });
                // createStore calls load() automatically when autoLoad is true — check state is restored
                ls.restore();
                assertEqual(store.theme, 'dark', 'theme rehydrated');
            });

            await test('load() keeps initialState defaults for keys absent from storage', async function () {
                const ls = stubLocalStorage();
                ls.raw['test-load-defaults'] = JSON.stringify({ existing: 'stored' });
                const store = wakaStore.createStore({ existing: 'default', newKey: 'default' }, { persist: 'test-load-defaults', autoLoad: true });
                ls.restore();
                assertEqual(store.existing, 'stored',  'existing key overwritten');
                assertEqual(store.newKey,   'default', 'new key keeps default');
            });

            await test('load() returns false when nothing is stored', async function () {
                const ls = stubLocalStorage();
                const store = wakaStore.createStore({ x: 0 }, { persist: 'test-load-empty' });
                // storage is empty — load() already ran in createStore, ran again explicitly
                const result = store.load();
                ls.restore();
                assert(result === false, 'load() returned false for missing key');
            });

            await test('load() returns false when stored data is not valid JSON', async function () {
                const ls = stubLocalStorage();
                ls.raw['test-load-bad'] = 'not-json{{';
                const store = wakaStore.createStore({ x: 0 }, { persist: 'test-load-bad' });
                const result = store.load();
                ls.restore();
                assert(result === false, 'load() returned false for invalid JSON');
            });

            await test('clearPersist() removes the key from localStorage', async function () {
                const ls = stubLocalStorage();
                const store = wakaStore.createStore({ x: 1 }, { persist: 'test-clear' });
                store.save();
                assert(Object.prototype.hasOwnProperty.call(ls.raw, 'test-clear'), 'key exists before clear');
                store.clearPersist();
                assert(!Object.prototype.hasOwnProperty.call(ls.raw, 'test-clear'), 'key removed after clear');
                ls.restore();
            });

            await test('clearPersist() does not affect in-memory state', async function () {
                const ls = stubLocalStorage();
                const store = wakaStore.createStore({ count: 5 }, { persist: 'test-clear-mem' });
                store.clearPersist();
                ls.restore();
                assertEqual(store.count, 5, 'in-memory state unchanged');
            });

            await test('clearPersist() returns false when no persist key set', async function () {
                const store = wakaStore.createStore({ x: 1 });
                const result = store.clearPersist();
                assert(result === false, 'clearPersist() returned false');
            });

            // ── 9. Local persistence — autoSave ───────────────────────────────────
            suite('Local persistence — autoSave');

            await test('autoSave writes to localStorage on mutation', async function () {
                const ls = stubLocalStorage();
                const store = wakaStore.createStore({ count: 0 }, { persist: 'test-autosave', autoSave: true });
                store.count = 42;
                await wait(20); // let debounce flush
                ls.restore();
                const stored = JSON.parse(ls.raw['test-autosave'] || 'null');
                assert(stored !== null, 'something was written');
                assertEqual(stored.count, 42, 'count persisted');
            });

            await test('autoSave debounces — multiple mutations produce one write', async function () {
                const ls = stubLocalStorage();
                let writeCount = 0;
                const origSetItem = localStorage.setItem.bind(localStorage);

                // Patch setItem to count writes after stub is in place
                const ls2 = stubLocalStorage();
                const origStub = window.localStorage;
                const countingStub = Object.assign({}, origStub, {
                    setItem: function (k, v) { writeCount++; origStub.setItem(k, v); }
                });
                Object.defineProperty(window, 'localStorage', { configurable: true, get: () => countingStub });

                const store = wakaStore.createStore({ a: 0, b: 0, c: 0 }, { persist: 'test-debounce', autoSave: true });
                store.a = 1;
                store.b = 2;
                store.c = 3;
                await wait(20);

                const writes = writeCount;
                Object.defineProperty(window, 'localStorage', { configurable: true, get: () => origStub });
                ls2.restore();
                ls.restore();

                assert(writes <= 2, 'debounced to at most 2 writes (' + writes + ')');
            });

            await test('stopAutoSave() stops further automatic writes', async function () {
                const ls = stubLocalStorage();
                const store = wakaStore.createStore({ val: 0 }, { persist: 'test-stop-autosave', autoSave: true });
                store.val = 1;
                await wait(20);
                store.stopAutoSave();
                store.val = 99;
                await wait(20);
                const stored = JSON.parse(ls.raw['test-stop-autosave'] || 'null');
                ls.restore();
                assert(stored.val !== 99, 'write did not happen after stopAutoSave (' + (stored && stored.val) + ')');
            });

            await test('autoSave: true without persist key is silently ignored', async function () {
                const ls = stubLocalStorage();
                const keysBefore = Object.keys(ls.raw).length;
                const store = wakaStore.createStore({ x: 1 }, { autoSave: true });
                store.x = 2;
                await wait(20);
                const keysAfter = Object.keys(ls.raw).length;
                ls.restore();
                assertEqual(keysAfter, keysBefore, 'no keys written to localStorage');
            });

            // ── 10. destroy() ─────────────────────────────────────────────────────
            suite('destroy()');

            await test('destroy() stops an active poll', async function () {
                const store = wakaStore.createStore({ name: null });
                const spy = stubFetch(USER_RESPONSE);

                store.poll('/api/user', { interval: 50 });
                await wait(80);
                store.destroy();
                const callsAtDestroy = spy.calls;

                await wait(150);
                spy.restore();

                assertEqual(spy.calls, callsAtDestroy, 'no further poll calls after destroy');
            });

            await test('destroy() stops autoSave', async function () {
                const ls = stubLocalStorage();
                const store = wakaStore.createStore({ val: 0 }, { persist: 'test-destroy-autosave', autoSave: true });
                store.val = 1;
                await wait(20);
                store.destroy();
                store.val = 99;
                await wait(20);
                const stored = JSON.parse(ls.raw['test-destroy-autosave'] || 'null');
                ls.restore();
                assert(stored.val !== 99, 'autoSave stopped by destroy');
            });

            await test('destroy() is safe to call when no poll or autoSave is active', async function () {
                const store = wakaStore.createStore({ x: 1 });
                store.destroy(); // should not throw
                pass('no error thrown');
            });

            await test('store remains usable after destroy()', async function () {
                const ls = stubLocalStorage();
                const store = wakaStore.createStore({ count: 0 }, { persist: 'test-destroy-usable' });
                store.destroy();
                store.count = 5;
                store.save();
                const stored = JSON.parse(ls.raw['test-destroy-usable'] || 'null');
                ls.restore();
                assertEqual(stored.count, 5, 'save() still works after destroy');
            });

            // ── 11. push() ────────────────────────────────────────────────────────
            suite('push()');

            await test('push() sends a PATCH request by default', async function () {
                let capturedMethod = null;
                const original = window.fetch;
                window.fetch = function (url, opts) {
                    capturedMethod = opts && opts.method;
                    return Promise.resolve({ ok: true, json: () => Promise.resolve(USER_RESPONSE) });
                };
                const store = wakaStore.createStore({ name: null });
                await store.push('/api/user/1');
                window.fetch = original;
                assertEqual(capturedMethod, 'PATCH', 'method is PATCH');
            });

            await test('push() sends the full store state as JSON body by default', async function () {
                let capturedBody = null;
                const original = window.fetch;
                window.fetch = function (url, opts) {
                    capturedBody = JSON.parse(opts.body);
                    return Promise.resolve({ ok: true, json: () => Promise.resolve(USER_RESPONSE) });
                };
                const store = wakaStore.createStore({ name: 'Floris', role: 'admin' });
                await store.push('/api/user/1');
                window.fetch = original;
                assertEqual(capturedBody.name, 'Floris', 'name in body');
                assertEqual(capturedBody.role, 'admin', 'role in body');
            });

            await test('push() merges plain JSON response back into the store', async function () {
                const spy = stubFetch(USER_RESPONSE);
                const store = wakaStore.createStore({ name: null, role: null });
                await store.push('/api/user/1');
                spy.restore();
                assertEqual(store.name, 'Floris', 'name merged from response');
                assertEqual(store.role, 'admin',  'role merged from response');
            });

            await test('push() sends Content-Type: application/json', async function () {
                let capturedContentType = null;
                const original = window.fetch;
                window.fetch = function (url, opts) {
                    capturedContentType = opts && opts.headers && opts.headers['Content-Type'];
                    return Promise.resolve({ ok: true, json: () => Promise.resolve(USER_RESPONSE) });
                };
                const store = wakaStore.createStore({ name: null });
                await store.push('/api/user/1');
                window.fetch = original;
                assertEqual(capturedContentType, 'application/json', 'Content-Type header');
            });

            await test('push() accepts a custom HTTP method', async function () {
                let capturedMethod = null;
                const original = window.fetch;
                window.fetch = function (url, opts) {
                    capturedMethod = opts && opts.method;
                    return Promise.resolve({ ok: true, json: () => Promise.resolve(USER_RESPONSE) });
                };
                const store = wakaStore.createStore({ name: null });
                await store.push('/api/user/1', { method: 'PUT' });
                window.fetch = original;
                assertEqual(capturedMethod, 'PUT', 'method is PUT');
            });

            await test('push() accepts a partial body', async function () {
                let capturedBody = null;
                const original = window.fetch;
                window.fetch = function (url, opts) {
                    capturedBody = JSON.parse(opts.body);
                    return Promise.resolve({ ok: true, json: () => Promise.resolve(USER_RESPONSE) });
                };
                const store = wakaStore.createStore({ name: 'Floris', role: 'admin' });
                await store.push('/api/user/1', { body: { name: store.name } });
                window.fetch = original;
                assert('name' in capturedBody, 'name in body');
                assert(!('role' in capturedBody), 'role not in partial body');
            });

            await test('push() calls custom merge callback with store as this', async function () {
                let capturedThis = null;
                const spy = stubFetch({ custom: true });
                const store = wakaStore.createStore({ result: null });
                await store.push('/api/user/1', {
                    merge: function (response) {
                        capturedThis = this;
                        this.result = response.custom;
                    }
                });
                spy.restore();
                assert(capturedThis === store, 'this === store');
                assert(store.result === true, 'merge applied');
            });

            await test('push() rejects and calls onError on HTTP error', async function () {
                const spy = stubFetch(null, { fail: true, status: 422 });
                const store = wakaStore.createStore({ name: null });
                let errorReceived = null;
                let rejected = false;
                await store.push('/api/user/1', {
                    onError: function (e) { errorReceived = e; }
                }).catch(function () { rejected = true; });
                spy.restore();
                assert(errorReceived !== null, 'onError called');
                assert(rejected, 'promise rejected');
                assert(errorReceived.status === 422, 'error carries status');
            });

            await test('push() skips merge for non-object response (e.g. 204 null)', async function () {
                const original = window.fetch;
                window.fetch = function () {
                    return Promise.resolve({ ok: true, json: () => Promise.resolve(null) });
                };
                const store = wakaStore.createStore({ name: 'Floris' });
                await store.push('/api/user/1');
                window.fetch = original;
                assertEqual(store.name, 'Floris', 'store unchanged after null response');
            });

            // ── 12. connect() / disconnect() ──────────────────────────────────────
            suite('connect() / disconnect()');

            /**
             * Minimal fake WebSocket. Exposes send/close and allows tests to
             * drive onopen / onmessage / onerror / onclose from outside.
             */
            function FakeWebSocket(url, protocols) {
                this.url       = url;
                this.protocols = protocols;
                this.readyState = 0; // CONNECTING
                this.onopen    = null;
                this.onmessage = null;
                this.onerror   = null;
                this.onclose   = null;
                this.closed    = false;
                FakeWebSocket.last = this;
                FakeWebSocket.instances.push(this);
            }

            FakeWebSocket.prototype.close = function () {
                this.closed = true;
                this.readyState = 3; // CLOSED
            };

            FakeWebSocket.prototype._open = function () {
                this.readyState = 1;
                if (this.onopen) this.onopen();
            };

            FakeWebSocket.prototype._message = function (data) {
                if (this.onmessage) this.onmessage({ data: JSON.stringify(data) });
            };

            FakeWebSocket.prototype._messageRaw = function (raw) {
                if (this.onmessage) this.onmessage({ data: raw });
            };

            FakeWebSocket.prototype._error = function (event) {
                if (this.onerror) this.onerror(event || {});
            };

            FakeWebSocket.prototype._close = function (code, reason) {
                this.readyState = 3;
                if (this.onclose) this.onclose({ code: code || 1000, reason: reason || '' });
            };

            FakeWebSocket.instances = [];
            FakeWebSocket.last = null;

            function installFakeWebSocket() {
                FakeWebSocket.instances = [];
                FakeWebSocket.last = null;
                window._realWebSocket = window.WebSocket;
                window.WebSocket = FakeWebSocket;
            }

            function restoreFakeWebSocket() {
                window.WebSocket = window._realWebSocket;
            }

            await test('connect() opens a WebSocket to the given URL', async function () {
                installFakeWebSocket();
                const store = wakaStore.createStore({ name: null });
                store.connect('wss://example.com/updates');
                const ws = FakeWebSocket.last;
                store.disconnect();
                restoreFakeWebSocket();
                assert(ws !== null, 'WebSocket was created');
                assertEqual(ws.url, 'wss://example.com/updates', 'URL');
            });

            await test('incoming message is merged into the store', async function () {
                installFakeWebSocket();
                const store = wakaStore.createStore({ name: null, role: null });
                store.connect('wss://example.com/updates');
                const ws = FakeWebSocket.last;
                ws._open();
                ws._message({ name: 'Floris', role: 'admin' });
                store.disconnect();
                restoreFakeWebSocket();
                assertEqual(store.name, 'Floris', 'name merged');
                assertEqual(store.role, 'admin',  'role merged');
            });

            await test('custom merge callback is called with store as this', async function () {
                installFakeWebSocket();
                let capturedThis = null;
                const store = wakaStore.createStore({ items: [] });
                store.connect('wss://example.com/updates', {
                    merge: function (data) {
                        capturedThis = this;
                        this.items = data.items;
                    }
                });
                const ws = FakeWebSocket.last;
                ws._open();
                ws._message({ items: ['a', 'b'] });
                store.disconnect();
                restoreFakeWebSocket();
                assert(capturedThis === store, 'this === store');
                assertEqual(store.items, ['a', 'b'], 'items merged via callback');
            });

            await test('non-JSON message logs an error and does not crash', async function () {
                installFakeWebSocket();
                const errors = [];
                const origError = console.error;
                console.error = function () { errors.push([].slice.call(arguments).join(' ')); };
                const store = wakaStore.createStore({ x: 1 });
                store.connect('wss://example.com/updates');
                const ws = FakeWebSocket.last;
                ws._open();
                ws._messageRaw('not-valid-json{{');
                store.disconnect();
                restoreFakeWebSocket();
                console.error = origError;
                assert(errors.length > 0, 'console.error called for invalid JSON');
                assertEqual(store.x, 1, 'store unchanged');
            });

            await test('non-plain-object message warns and does not crash', async function () {
                installFakeWebSocket();
                const warnings = [];
                const origWarn = console.warn;
                console.warn = function () { warnings.push([].slice.call(arguments).join(' ')); };
                const store = wakaStore.createStore({ x: 1 });
                store.connect('wss://example.com/updates');
                const ws = FakeWebSocket.last;
                ws._open();
                ws._message([1, 2, 3]); // array — not a plain object
                store.disconnect();
                restoreFakeWebSocket();
                console.warn = origWarn;
                assert(warnings.length > 0, 'console.warn called for array message');
            });

            await test('onError callback receives the error event', async function () {
                installFakeWebSocket();
                let receivedEvent = null;
                const store = wakaStore.createStore({ x: 1 });
                store.connect('wss://example.com/updates', {
                    onError: function (e) { receivedEvent = e; }
                });
                const ws = FakeWebSocket.last;
                ws._error({ type: 'error' });
                store.disconnect();
                restoreFakeWebSocket();
                assert(receivedEvent !== null, 'onError called');
            });

            await test('disconnect() closes the socket and prevents further message merges', async function () {
                installFakeWebSocket();
                const store = wakaStore.createStore({ name: null });
                store.connect('wss://example.com/updates');
                const ws = FakeWebSocket.last;
                ws._open();
                store.disconnect();
                ws._message({ name: 'ShouldNotAppear' });
                restoreFakeWebSocket();
                assert(ws.closed, 'socket was closed');
                assert(store.name === null, 'message after disconnect was ignored');
            });

            await test('disconnect() is safe to call when not connected', async function () {
                const store = wakaStore.createStore({ x: 1 });
                store.disconnect(); // should not throw
                pass('no error thrown');
            });

            await test('connect() while already connected replaces the socket', async function () {
                installFakeWebSocket();
                const store = wakaStore.createStore({ name: null });
                store.connect('wss://example.com/first');
                const ws1 = FakeWebSocket.last;
                ws1._open();

                store.connect('wss://example.com/second');
                const ws2 = FakeWebSocket.last;
                restoreFakeWebSocket();

                assert(ws1.closed, 'first socket closed');
                assert(ws1 !== ws2, 'a new socket was created');
                store.disconnect();
            });

            await test('reconnect is attempted after close by default', async function () {
                installFakeWebSocket();
                const store = wakaStore.createStore({ x: 1 });
                store.connect('wss://example.com/updates', {
                    reconnectDelay: 10,
                    reconnectDelayMax: 50
                });
                const ws1 = FakeWebSocket.last;
                ws1._open();
                ws1._close(1006); // abnormal close
                await wait(50); // let backoff fire
                const ws2 = FakeWebSocket.last;
                store.disconnect();
                restoreFakeWebSocket();
                assert(ws2 !== ws1, 'a new socket was opened after close');
            });

            await test('onClose returning false suppresses reconnect', async function () {
                installFakeWebSocket();
                const store = wakaStore.createStore({ x: 1 });
                store.connect('wss://example.com/updates', {
                    reconnectDelay: 10,
                    onClose: function (e) { return false; }
                });
                const ws1 = FakeWebSocket.last;
                ws1._open();
                ws1._close(4001);
                await wait(50);
                const ws2 = FakeWebSocket.last;
                restoreFakeWebSocket();
                assert(ws2 === ws1, 'no reconnect after onClose returned false');
            });

            await test('reconnect: false disables all reconnection', async function () {
                installFakeWebSocket();
                const store = wakaStore.createStore({ x: 1 });
                store.connect('wss://example.com/updates', {
                    reconnect: false,
                    reconnectDelay: 10
                });
                const ws1 = FakeWebSocket.last;
                ws1._open();
                ws1._close(1006);
                await wait(50);
                const ws2 = FakeWebSocket.last;
                restoreFakeWebSocket();
                assert(ws2 === ws1, 'no reconnect when reconnect: false');
            });

            await test('reconnect counter resets to 0 after successful open', async function () {
                installFakeWebSocket();
                const store = wakaStore.createStore({ x: 1 });
                store.connect('wss://example.com/updates', {
                    reconnectDelay: 10,
                    reconnectDelayMax: 100
                });
                const ws1 = FakeWebSocket.last;
                ws1._open();
                ws1._close(1006);
                await wait(30); // reconnect fires
                const ws2 = FakeWebSocket.last;
                ws2._open(); // successful open — counter should reset
                // Verify by closing again and checking a new socket appears promptly
                ws2._close(1006);
                await wait(30);
                const ws3 = FakeWebSocket.last;
                store.disconnect();
                restoreFakeWebSocket();
                assert(ws3 !== ws2, 'reconnect still works after counter reset');
            });

            await test('destroy() closes an active WebSocket connection', async function () {
                installFakeWebSocket();
                const store = wakaStore.createStore({ x: 1 });
                store.connect('wss://example.com/updates');
                const ws = FakeWebSocket.last;
                ws._open();
                store.destroy();
                restoreFakeWebSocket();
                assert(ws.closed, 'socket closed by destroy');
            });

            await test('protocols option is passed to WebSocket constructor', async function () {
                installFakeWebSocket();
                const store = wakaStore.createStore({ x: 1 });
                store.connect('wss://example.com/updates', { protocols: 'v1.json' });
                const ws = FakeWebSocket.last;
                store.disconnect();
                restoreFakeWebSocket();
                assertEqual(ws.protocols, 'v1.json', 'protocols forwarded');
            });

            // ── Summary ───────────────────────────────────────────────────────────

            summary.textContent = passed + ' passed, ' + failed + ' failed';
            summary.className   = failed === 0 ? 'all-pass' : 'has-fail';
        }

        // Kick off after scripts have loaded
        window.addEventListener('load', function () {
            if (typeof wakaStore === 'undefined') {
                summary.textContent = 'ERROR: wakastore.js not loaded — check script src paths';
                summary.className   = 'has-fail';
                return;
            }

            // Register plugin so createStore works (wakaPAC may or may not be present)
            if (typeof wakaPAC !== 'undefined') {
                wakaPAC.use(wakaStore);
            }

            runAll().catch(function (e) {
                console.error('Test runner error:', e);
            });
        });

    })();
</script>
