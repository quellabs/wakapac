<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WakaDDraw Scene Demo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #111;
            color: #ccc;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
            gap: 12px;
        }

        canvas[data-pac-id="game"] {
            display: block;
            border: 1px solid #444;
            image-rendering: pixelated;
        }

        #debug {
            font-size: 0.72rem;
            color: #aaa;
            width: 320px;
            line-height: 2;
        }

        #debug b {
            color: #7eb8f7;
            font-weight: normal;
        }

        #controls {
            font-size: 0.72rem;
            color: #666;
        }
    </style>
</head>
<body>

<canvas data-pac-id="game"
        width="320"
        height="240"
        tabindex="0"></canvas>

<div id="debug">
    hero pos: <b id="d-pos">—</b> &nbsp; frame: <b id="d-frame">—</b>
</div>

<div id="controls">
    Arrow keys / WASD — move hero &nbsp;|&nbsp; Target bounces autonomously.
</div>

<script src="../wakapac.js"></script>
<script src="../plugins/wakaddraw.js"></script>
<script>

    // =============================================================================
    // SURFACE DRAWING
    // =============================================================================

    function _drawHero(surface) {
        const ctx = surface._ctx;
        const FW = 32;
        const colors = ['#4a9eff', '#5aaeff', '#4a9eff', '#3a8eef'];

        ctx.fillStyle = '#ff00ff';
        ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);

        for (let f = 0; f < 4; f++) {
            const ox = f * FW;
            ctx.fillStyle = colors[f];
            ctx.fillRect(ox + 8, 8, 16, 18);
            ctx.fillStyle = '#c8e6ff';
            ctx.fillRect(ox + 10, 2, 12, 10);
            ctx.fillStyle = '#fff';
            ctx.fillRect(ox + 12, 5, 2, 2);
            ctx.fillRect(ox + 18, 5, 2, 2);
            const lo = (f === 1 || f === 3) ? [-3, 3] : [0, 0];
            ctx.fillStyle = '#2a6ebf';
            ctx.fillRect(ox + 10, 26 + lo[0], 5, 4);
            ctx.fillRect(ox + 17, 26 + lo[1], 5, 4);
        }

        wakaDDraw.applyColorKey(surface);
    }

    function _drawTarget(surface) {
        const ctx = surface._ctx;
        ctx.fillStyle = '#ff00ff';
        ctx.fillRect(0, 0, 32, 32);
        ctx.fillStyle = '#e05030';
        ctx.fillRect(6, 6, 20, 20);
        ctx.fillStyle = '#fff';
        ctx.fillRect(14, 6, 4, 20);
        ctx.fillRect(6, 14, 20, 4);
        wakaDDraw.applyColorKey(surface);
    }

    // =============================================================================
    // COMPONENT
    // =============================================================================

    wakaPAC.use(wakaDDraw);

    const Demo = {

        primary: null,
        scene: null,
        heroSurface: null,
        targetSurface: null,
        heroSprite: null,
        targetSprite: null,

        // Hero animation state
        heroFrame: 0,
        _heroElapsed: 0,
        HERO_MS_FRAME: 150,

        // Target patrol
        _targetVx: 2,

        keys: { left: false, right: false, up: false, down: false },
        _timer: 0,
        _lastTime: 0,

        init() {
            this.primary = wakaDDraw.getSurface(this.pacId);

            // Offscreen surfaces
            this.heroSurface = wakaDDraw.createSurface(128, 32, 32, 32);
            this.targetSurface = wakaDDraw.createSurface(32, 32, 32, 32);

            _drawHero(this.heroSurface);
            _drawTarget(this.targetSurface);

            // Scene with fallback background color
            this.scene = wakaDDraw.sceneCreate({ background: '#1a2a3a' });

            // Target at z=0, hero at z=1
            this.targetSprite = wakaDDraw.createSprite(this.targetSurface, null, 0);
            this.heroSprite = wakaDDraw.createSprite(this.heroSurface,
                { x: 0, y: 0, left: 0, top: 0, width: 32, height: 32 }, 1);

            this.targetSprite.moveTo(144, 104);
            this.heroSprite.moveTo(40, 104);

            wakaDDraw.sceneAddSprite(this.scene, this.targetSprite);
            wakaDDraw.sceneAddSprite(this.scene, this.heroSprite);
            wakaDDraw.sceneInvalidate(this.scene, this.primary);

            this._lastTime = performance.now();
            this._timer = wakaPAC.setTimer(this.pacId, 16);
        },

        msgProc(event) {
            switch (event.message) {

                case wakaPAC.MSG_TIMER: {
                    if (event.wParam !== this._timer) {
                        break;
                    }

                    const now = performance.now();
                    const delta = now - this._lastTime;
                    this._lastTime = now;

                    this._tick(delta);
                    wakaDDraw.sceneRender(this.scene, this.primary);
                    break;
                }

                case wakaPAC.MSG_KEYDOWN: {
                    if (this._handleKey(event.wParam, true)) {
                        return false;
                    }
                    break;
                }

                case wakaPAC.MSG_KEYUP: {
                    if (this._handleKey(event.wParam, false)) {
                        return false;
                    }
                    break;
                }

                case wakaPAC.MSG_DESTROYED: {
                    wakaDDraw.sceneDestroy(this.scene);
                    this.scene = null;
                    this.primary = null;
                    this.heroSurface = null;
                    this.targetSurface = null;
                    this.heroSprite = null;
                    this.targetSprite = null;
                    break;
                }
            }
        },

        _tick(delta) {
            const W = 320, H = 240;
            const k = this.keys;

            // Target: autonomous horizontal bounce
            const tx = this.targetSprite.x + this._targetVx * delta * 0.1;
            if (tx <= 0 || tx >= W - 32) {
                this._targetVx *= -1;
            }
            this.targetSprite.moveTo(Math.round(Math.max(0, Math.min(W - 32, tx))), this.targetSprite.y);

            // Hero: keyboard or auto-chase
            let dx = 0, dy = 0;
            if (k.left) {
                dx -= 1;
            }
            if (k.right) {
                dx += 1;
            }
            if (k.up) {
                dy -= 1;
            }
            if (k.down) {
                dy += 1;
            }

            if (dx === 0 && dy === 0) {
                if (this.heroSprite.x < this.targetSprite.x) {
                    dx = 1;
                }
                if (this.heroSprite.x > this.targetSprite.x) {
                    dx = -1;
                }
                if (this.heroSprite.y < this.targetSprite.y) {
                    dy = 1;
                }
                if (this.heroSprite.y > this.targetSprite.y) {
                    dy = -1;
                }
            }

            if (dx !== 0 && dy !== 0) {
                dx *= 0.707;
                dy *= 0.707;
            }

            const moving = dx !== 0 || dy !== 0;

            if (moving) {
                const nx = Math.round(Math.max(0, Math.min(W - 32, this.heroSprite.x + dx * delta * 0.12)));
                const ny = Math.round(Math.max(0, Math.min(H - 32, this.heroSprite.y + dy * delta * 0.12)));
                this.heroSprite.moveTo(nx, ny);
            }

            // Hero animation — advance frame and update source rect
            if (moving) {
                this._heroElapsed += delta;
                if (this._heroElapsed >= this.HERO_MS_FRAME) {
                    this._heroElapsed %= this.HERO_MS_FRAME;
                    this.heroFrame = (this.heroFrame + 1) % this.heroSurface.frames;
                    const fx = this.heroFrame * 32;
                    this.heroSprite.setRect({ x: fx, y: 0, left: fx, top: 0, width: 32, height: 32 });
                }
            } else {
                if (this.heroFrame !== 0) {
                    this.heroFrame = 0;
                    this._heroElapsed = 0;
                    this.heroSprite.setRect({ x: 0, y: 0, left: 0, top: 0, width: 32, height: 32 });
                }
            }

            document.getElementById('d-pos').textContent = `${this.heroSprite.x}, ${this.heroSprite.y}`;
            document.getElementById('d-frame').textContent = this.heroFrame;
        },

        _handleKey(vk, down) {
            switch (vk) {
                case wakaPAC.VK_LEFT:
                case wakaPAC.VK_A:
                    this.keys.left = down;
                    return true;
                case wakaPAC.VK_RIGHT:
                case wakaPAC.VK_D:
                    this.keys.right = down;
                    return true;
                case wakaPAC.VK_UP:
                case wakaPAC.VK_W:
                    this.keys.up = down;
                    return true;
                case wakaPAC.VK_DOWN:
                case wakaPAC.VK_S:
                    this.keys.down = down;
                    return true;
            }
            return false;
        }
    };

    wakaPAC('[data-pac-id="game"]', Demo);

</script>
</body>
</html>
