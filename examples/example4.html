<html>
<body>

<div id="parent-component">
    <h1>Parent: {{message}}</h1>
    <button data-pac-bind="click: sendMessageToChild">Send to Child</button>

    <div id="child-component">
        <h2>Child: {{childMessage}}</h2>
        <button data-pac-bind="click: sendNotificationToParent">Notify Parent</button>
    </div>
</div>

<script src="../wakapac.js"></script>
<script>
    const MSG_UPDATE_MESSAGE = wakaPAC.MSG_USER + 1;
    const MSG_CHILD_CHANGED  = wakaPAC.MSG_USER + 2;

    const parent = wakaPAC('#parent-component', {
        message: 'Hello from parent',

        sendMessageToChild() {
            wakaPAC.sendMessage('child-component', MSG_UPDATE_MESSAGE, 0, 0, { text: 'Hello from parent!' });
        },

        /*
            msgProc is called whenever this component receives a message.
            Check event.message to determine which message arrived, then
            read event.detail for the data the sender included.
        */
        msgProc(event) {
            if (event.message === MSG_CHILD_CHANGED) {
                this.message = `Child says: ${event.detail.message}`;
            }
        }
    });

    const child = wakaPAC('#child-component', {
        childMessage: 'Hello from child',

        sendNotificationToParent() {
            const parentId = wakaPAC.getParentPacId(this.pacId);

            if (parentId) {
                wakaPAC.sendMessage(parentId, MSG_CHILD_CHANGED, 0, 0, { message: this.childMessage });
            }
        },

        // Same pattern: match on event.message, read payload from event.detail.
        msgProc(event) {
            if (event.message === MSG_UPDATE_MESSAGE) {
                this.childMessage = event.detail.text;
            }
        }
    });
</script>
</body>
</html>
